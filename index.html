<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark"></div>
      <div>
        <span class="brand">Rajnandini Fashion</span>
        <span class="brand-sub">Sales Dashboard</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="last-updated" id="lastUpdated">Loading…</span>
      <button class="refresh-btn" onclick="loadData()">↺ Refresh</button>
    </div>
  </div>

  <!-- GLOBAL FILTER BAR -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-group">
      <label>Master Channel</label>
      <select id="fMaster" onchange="applyFilters()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Channel</label>
      <select id="fChannel" onchange="applyFilters()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Category</label>
      <select id="fCategory" onchange="applyFilters()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Month</label>
      <select id="fMonth" onchange="applyFilters()"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Last 30 Days</label>
      <select id="fLast30" onchange="applyFilters()">
        <option value="">All</option>
        <option value="true">Active</option>
        <option value="false">Inactive</option>
      </select>
    </div>
    <button class="clear-btn" onclick="clearFilters()">✕ Clear</button>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <main class="container">

    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card skeleton"></div>
      <div class="kpi-card skeleton"></div>
      <div class="kpi-card skeleton"></div>
      <div class="kpi-card skeleton"></div>
      <div class="kpi-card skeleton"></div>
    </div>

    <!-- Charts Row 1 -->
    <div class="charts-row two-one">
      <div class="chart-card">
        <div class="chart-header"><h2>Sales by Month</h2></div>
        <div class="chart-wrap" style="height:260px;">
          <canvas id="monthChart" role="img" aria-label="Monthly sales bar chart">Loading…</canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-header"><h2>Sales by Master Channel</h2></div>
        <div class="chart-wrap" style="height:260px;">
          <canvas id="masterChart" role="img" aria-label="Sales by master channel doughnut">Loading…</canvas>
        </div>
      </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="charts-row two-one">
      <div class="chart-card">
        <div class="chart-header"><h2>Top Categories</h2></div>
        <div class="chart-wrap" id="catWrap" style="height:300px;">
          <canvas id="catChart" role="img" aria-label="Top categories horizontal bar">Loading…</canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-header"><h2>Sales vs Returns by Channel</h2></div>
        <div class="chart-wrap" style="height:300px;">
          <canvas id="svrChart" role="img" aria-label="Sales vs returns grouped bar">Loading…</canvas>
        </div>
      </div>
    </div>

    <!-- DATA TABLE -->
    <div class="table-card">
      <div class="table-header">
        <h2>All Records <span class="rec-badge" id="recBadge"></span></h2>
        <div class="table-controls">
          <input type="text" id="searchInput" placeholder="🔍 Search all columns…" oninput="renderTable()" />
          <select id="tSortCol" onchange="renderTable()">
            <option value="">Sort by…</option>
          </select>
          <select id="tSortDir" onchange="renderTable()">
            <option value="asc">↑ Ascending</option>
            <option value="desc">↓ Descending</option>
          </select>
          <select id="tPageSize" onchange="renderTable()">
            <option value="50">50 rows</option>
            <option value="100">100 rows</option>
            <option value="250">250 rows</option>
            <option value="500">500 rows</option>
            <option value="9999">All</option>
          </select>
        </div>
      </div>

      <!-- Column visibility -->
      <div class="col-toggle" id="colToggle"></div>

      <div class="table-wrap">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">No records match your filters.</div>
      </div>

      <!-- Pagination -->
      <div class="table-footer">
        <span id="tableFooter"></span>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <span>Live data · <a id="sheetLink" href="#" target="_blank">Google Sheets</a></span>
    <span>Rajnandini Fashion &copy; 2025</span>
  </footer>

  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
